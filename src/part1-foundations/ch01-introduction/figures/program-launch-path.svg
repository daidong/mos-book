<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Program launch path across user space, kernel, and device</title>
  <desc id="desc">A swimlane diagram showing shell fork or clone, execve, loader activity, user code, write system call, and terminal output across user space, kernel, and device layers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .laneTitle { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
      .boxTitle { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; }
      .body { font: 400 17px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #374151; }
      .outline { stroke: #374151; stroke-width: 2; fill: none; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff" />
  <text class="title" x="60" y="62">Running a program is a cross-layer sequence, not a single event</text>
  <text class="subtitle" x="60" y="94">The shell starts the process, the kernel installs the new image, the loader maps dependencies, and user code eventually re-enters the kernel for output.</text>

  <rect x="60" y="145" width="1160" height="140" rx="18" ry="18" fill="#e8f3fb" class="outline" />
  <rect x="60" y="305" width="1160" height="190" rx="18" ry="18" fill="#fdeecf" class="outline" />
  <rect x="60" y="515" width="1160" height="130" rx="18" ry="18" fill="#f8d9dc" class="outline" />

  <text class="laneTitle" x="85" y="185">User space</text>
  <text class="laneTitle" x="85" y="345">Kernel</text>
  <text class="laneTitle" x="85" y="555">Device / terminal side effects</text>

  <rect x="150" y="195" width="150" height="62" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="190" y="232">Shell</text>

  <rect x="360" y="195" width="180" height="62" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="392" y="220">Child process</text>
  <text class="small" x="405" y="244">before `execve()`</text>

  <rect x="620" y="195" width="190" height="62" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="653" y="220">Dynamic linker</text>
  <text class="small" x="660" y="244">maps shared libs</text>

  <rect x="885" y="195" width="150" height="62" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="928" y="232">User code</text>

  <rect x="1090" y="195" width="90" height="62" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="1113" y="232">TTY</text>

  <rect x="180" y="365" width="170" height="76" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="215" y="394">`clone()` /</text>
  <text class="boxTitle" x="224" y="419">`fork()`</text>

  <rect x="430" y="365" width="175" height="76" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="476" y="394">`execve()`</text>
  <text class="small" x="455" y="419">new program image</text>

  <rect x="675" y="350" width="220" height="106" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="736" y="382">loader path</text>
  <text class="body" x="702" y="410">`mmap()`</text>
  <text class="body" x="782" y="410">`openat()`</text>
  <text class="body" x="700" y="436">`read()`</text>
  <text class="small" x="768" y="436">install libraries</text>

  <rect x="960" y="365" width="145" height="76" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="1002" y="394">`write()`</text>
  <text class="small" x="992" y="419">syscall boundary</text>

  <rect x="1030" y="545" width="150" height="70" rx="14" ry="14" fill="#ffffff" class="outline" />
  <text class="boxTitle" x="1063" y="575">Bytes appear</text>
  <text class="small" x="1074" y="599">on terminal</text>

  <path class="arrow" d="M 300 226 L 360 226" />
  <path class="arrow" d="M 540 226 L 620 226" />
  <path class="arrow" d="M 810 226 L 885 226" />

  <path class="arrow" d="M 225 257 L 225 365" />
  <path class="arrow" d="M 518 257 L 518 365" />
  <path class="arrow" d="M 785 257 L 785 350" />
  <path class="arrow" d="M 1030 257 L 1030 365" />
  <path class="arrow" d="M 1105 441 L 1105 545" />

  <path class="arrow" d="M 350 403 L 430 403" />
  <path class="arrow" d="M 605 403 L 675 403" />
  <path class="arrow" d="M 895 403 L 960 403" />

  <line x1="150" y1="285" x2="1180" y2="285" class="outline dashed" />
  <text class="small" x="1015" y="280">user ↔ kernel boundary</text>
  <line x1="150" y1="495" x2="1180" y2="495" class="outline dashed" />
  <text class="small" x="972" y="490">kernel ↔ device effects</text>

  <rect x="120" y="660" width="1040" height="60" rx="14" ry="14" fill="#f9fafb" class="outline" />
  <text class="body" x="145" y="696">Key reading habit: ask which step creates a new process, which step replaces the address space, and which steps cross the user–kernel boundary.</text>
</svg>
