<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="720" viewBox="0 0 1240 720" role="img" aria-labelledby="title desc">
  <title id="title">Evidence chain for systematic incident diagnosis</title>
  <desc id="desc">A left-to-right workflow diagram showing symptom, resource hypotheses, two supporting signals, an exclusion check, diagnosis, and mitigation plus verification.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .boxTitle { font: 700 21px Arial, Helvetica, sans-serif; fill: #111827; }
      .body { font: 400 17px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 700 18px Arial, Helvetica, sans-serif; fill: #374151; }
      .outline { stroke: #374151; stroke-width: 2; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1240" height="720" fill="#ffffff" />
  <text class="title" x="60" y="62">A credible oncall write-up needs more than one suspicious metric</text>
  <text class="subtitle" x="60" y="95">The target pattern in this book is two supporting signals plus one exclusion check before you claim the root cause.</text>

  <rect x="70" y="170" width="170" height="95" rx="18" ry="18" fill="#d8eef8" class="outline" />
  <text class="boxTitle" x="118" y="205">Symptom</text>
  <text class="body" x="95" y="233">p99 rose from</text>
  <text class="body" x="105" y="256">20 ms to 500 ms</text>

  <rect x="300" y="160" width="200" height="115" rx="18" ry="18" fill="#d8f3ea" class="outline" />
  <text class="boxTitle" x="339" y="197">Hypotheses</text>
  <text class="body" x="327" y="225">memory pressure?</text>
  <text class="body" x="327" y="250">CPU saturation?</text>

  <rect x="560" y="120" width="220" height="105" rx="18" ry="18" fill="#fde9c8" class="outline" />
  <text class="boxTitle" x="606" y="157">Signal 1</text>
  <text class="body" x="585" y="186">`memory.current` high</text>
  <text class="body" x="592" y="209">near `memory.max`</text>

  <rect x="560" y="255" width="220" height="105" rx="18" ry="18" fill="#fde9c8" class="outline" />
  <text class="boxTitle" x="606" y="292">Signal 2</text>
  <text class="body" x="600" y="321">`pgmajfault` spike</text>
  <text class="body" x="602" y="344">above baseline</text>

  <rect x="560" y="430" width="220" height="120" rx="18" ry="18" fill="#f8d9dc" class="outline" />
  <text class="boxTitle" x="585" y="468">Exclusion check</text>
  <text class="body" x="585" y="497">`vmstat r` and disk</text>
  <text class="body" x="584" y="520">queue stay near baseline</text>

  <rect x="845" y="200" width="180" height="130" rx="18" ry="18" fill="#e9ddf5" class="outline" />
  <text class="boxTitle" x="888" y="238">Diagnosis</text>
  <text class="body" x="870" y="267">memory pressure</text>
  <text class="body" x="865" y="290">forces major faults</text>
  <text class="body" x="878" y="313">into the tail</text>

  <rect x="1080" y="185" width="120" height="160" rx="18" ry="18" fill="#f9fafb" class="outline" />
  <text class="boxTitle" x="1096" y="223">Mitigate</text>
  <text class="body" x="1104" y="252">raise limit</text>
  <text class="body" x="1098" y="281">or shrink</text>
  <text class="body" x="1100" y="310">working set</text>

  <rect x="845" y="400" width="355" height="120" rx="18" ry="18" fill="#f9fafb" class="outline" />
  <text class="boxTitle" x="880" y="438">Verify with two aligned checks</text>
  <text class="body" x="878" y="468">1. user-facing metric: p99 drops toward baseline</text>
  <text class="body" x="878" y="494">2. mechanism metric: `pgmajfault` rate collapses</text>

  <path class="arrow" d="M 240 218 L 300 218" />
  <path class="arrow" d="M 500 218 L 560 172" />
  <path class="arrow" d="M 500 218 L 560 307" />
  <path class="arrow dashed" d="M 500 218 L 560 490" />
  <path class="arrow" d="M 780 172 L 845 240" />
  <path class="arrow" d="M 780 307 L 845 265" />
  <path class="arrow" d="M 780 490 L 845 265" />
  <path class="arrow" d="M 1025 265 L 1080 265" />
  <path class="arrow" d="M 935 330 L 935 400" />

  <text class="small" x="598" y="585">supporting evidence</text>
  <text class="small" x="576" y="614">+ explicit exclusion</text>
</svg>
