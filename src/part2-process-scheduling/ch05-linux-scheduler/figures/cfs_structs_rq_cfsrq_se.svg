<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 36px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111; }
      .text { font: 22px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111; }
      .small { font: 20px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #333; }
      .box { stroke: #333; stroke-width: 3; rx: 18; }
      .rq { fill: #eef6ff; }
      .cfsrq { fill: #eafff2; }
      .obj { fill: #fff4e6; }
      .neutral { fill: #f7f7f7; }
      .arrow { stroke: #333; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
      .note { fill: #fff; stroke: #888; stroke-width: 2; rx: 14; }
    </style>
  </defs>

  <text x="40" y="70" class="title">CFS key data structures (simplified, per CPU)</text>

  <!-- Left: rq -->
  <rect x="90" y="150" width="340" height="180" class="box rq"/>
  <text x="260" y="215" text-anchor="middle" class="text">struct rq</text>
  <text x="260" y="255" text-anchor="middle" class="small">per-CPU runqueue</text>
  <text x="110" y="305" class="small">• current</text>
  <text x="110" y="335" class="small">• nr_running</text>
  <text x="110" y="365" class="small">• cfs (fair rq)</text>

  <!-- Middle: cfs_rq -->
  <rect x="530" y="140" width="370" height="210" class="box cfsrq"/>
  <text x="715" y="205" text-anchor="middle" class="text">struct cfs_rq</text>
  <text x="715" y="245" text-anchor="middle" class="small">CFS/EEVDF runqueue</text>
  <text x="550" y="295" class="small">• RB-tree of runnable entities</text>
  <text x="550" y="325" class="small">• min_vruntime / avg</text>
  <text x="550" y="355" class="small">• (EEVDF) eligible set</text>

  <!-- RB-tree box -->
  <rect x="560" y="390" width="310" height="150" class="box neutral"/>
  <text x="715" y="445" text-anchor="middle" class="text">RB-tree</text>
  <text x="715" y="485" text-anchor="middle" class="small">runnable sched_entity</text>
  <text x="715" y="515" text-anchor="middle" class="small">ordered by key</text>

  <!-- Right: task_struct + sched_entity -->
  <rect x="1010" y="160" width="330" height="140" class="box obj"/>
  <text x="1175" y="220" text-anchor="middle" class="text">struct task_struct</text>
  <text x="1175" y="260" text-anchor="middle" class="small">thread/process task</text>

  <rect x="1010" y="340" width="330" height="160" class="box obj"/>
  <text x="1175" y="405" text-anchor="middle" class="text">struct sched_entity</text>
  <text x="1175" y="445" text-anchor="middle" class="small">se.vruntime</text>
  <text x="1175" y="475" text-anchor="middle" class="small">(EEVDF) se.deadline</text>

  <!-- Arrows -->
  <path d="M 430 240 L 530 240" class="arrow"/>
  <text x="480" y="225" text-anchor="middle" class="small">rq-&gt;cfs</text>

  <path d="M 900 245 L 1010 235" class="arrow"/>
  <text x="955" y="225" text-anchor="middle" class="small">pick next</text>

  <path d="M 1175 300 L 1175 340" class="arrow"/>
  <text x="1188" y="325" class="small">embeds</text>

  <path d="M 1010 420 L 870 465" class="arrow"/>
  <text x="935" y="430" text-anchor="middle" class="small">enqueue/dequeue</text>

  <!-- Note -->
  <rect x="90" y="570" width="1250" height="110" class="note"/>
  <text x="120" y="620" class="text">How to read this slide:</text>
  <text x="120" y="655" class="small">• task_struct carries scheduling state in sched_entity (CFS: vruntime; EEVDF: deadline/eligibility-related fields)</text>
  <text x="120" y="685" class="small">• cfs_rq is per-CPU. pick_next_task_fair() chooses an entity (CFS: min vruntime; EEVDF: earliest deadline among eligible)</text>
</svg>
