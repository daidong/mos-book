<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 36px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111; }
      .subtitle { font: 22px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #333; }
      .box { fill: #f7f7f7; stroke: #333; stroke-width: 3; rx: 18; }
      .boxText { font: 24px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111; }
      .small { font: 20px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #333; }
      .arrow { stroke: #333; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .hint { fill: #eef6ff; stroke: #3b82f6; stroke-width: 3; rx: 14; }
    </style>
  </defs>

  <text x="40" y="70" class="title">Scheduling class chain (conceptual): pick_next_task()</text>

  <!-- Boxes -->
  <rect x="70"  y="160" width="220" height="140" class="box"/>
  <rect x="330" y="160" width="260" height="140" class="box"/>
  <rect x="630" y="160" width="240" height="140" class="box"/>
  <rect x="910" y="160" width="270" height="140" class="box"/>
  <rect x="1220" y="160" width="160" height="140" class="box"/>

  <text x="180" y="215" text-anchor="middle" class="boxText">stop</text>
  <text x="180" y="250" text-anchor="middle" class="small">(highest)</text>

  <text x="460" y="215" text-anchor="middle" class="boxText">deadline</text>
  <text x="460" y="250" text-anchor="middle" class="small">SCHED_DEADLINE</text>

  <text x="750" y="215" text-anchor="middle" class="boxText">rt</text>
  <text x="750" y="250" text-anchor="middle" class="small">SCHED_FIFO / RR</text>

  <text x="1045" y="215" text-anchor="middle" class="boxText">fair</text>
  <text x="1045" y="250" text-anchor="middle" class="small">CFS / EEVDF</text>

  <text x="1300" y="215" text-anchor="middle" class="boxText">idle</text>
  <text x="1300" y="250" text-anchor="middle" class="small">(lowest)</text>

  <!-- Arrows between boxes -->
  <line x1="290" y1="230" x2="330" y2="230" class="arrow"/>
  <line x1="590" y1="230" x2="630" y2="230" class="arrow"/>
  <line x1="870" y1="230" x2="910" y2="230" class="arrow"/>
  <line x1="1180" y1="230" x2="1220" y2="230" class="arrow"/>

  <!-- Explanation -->
  <rect x="70" y="330" width="1310" height="130" class="hint"/>
  <text x="95" y="375" class="subtitle">Rule of thumb:</text>
  <text x="95" y="415" class="subtitle">Walk classes from highest → lowest; the first class with runnable tasks on this CPU wins.</text>
  <text x="95" y="455" class="subtitle">Most user processes run in <tspan font-weight="700">fair</tspan> (CFS/EEVDF). RT/Deadline can preempt CFS.</text>
</svg>
