<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <style>
    .t{font: 18px sans-serif; fill:#111}
    .h{font: 24px sans-serif; font-weight:700; fill:#111}
    .s{font: 14px sans-serif; fill:#111}
    .mono{font: 13px monospace; fill:#555}
  </style>

  <text x="500" y="30" text-anchor="middle" class="h">Raft Node States and Transitions</text>

  <!-- Follower -->
  <rect x="50" y="140" width="200" height="100" rx="50" fill="#e8f0fe" stroke="#4285f4" stroke-width="3"/>
  <text x="150" y="185" text-anchor="middle" class="t" font-weight="700" fill="#1a73e8">Follower</text>
  <text x="150" y="210" text-anchor="middle" class="s">passive; accepts</text>
  <text x="150" y="228" text-anchor="middle" class="s">AppendEntries</text>

  <!-- Candidate -->
  <rect x="400" y="140" width="200" height="100" rx="50" fill="#fef7e0" stroke="#f9ab00" stroke-width="3"/>
  <text x="500" y="185" text-anchor="middle" class="t" font-weight="700" fill="#e37400">Candidate</text>
  <text x="500" y="210" text-anchor="middle" class="s">requests votes;</text>
  <text x="500" y="228" text-anchor="middle" class="s">increments term</text>

  <!-- Leader -->
  <rect x="750" y="140" width="200" height="100" rx="50" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/>
  <text x="850" y="185" text-anchor="middle" class="t" font-weight="700" fill="#1e8e3e">Leader</text>
  <text x="850" y="210" text-anchor="middle" class="s">handles writes;</text>
  <text x="850" y="228" text-anchor="middle" class="s">sends heartbeats</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Follower → Candidate -->
  <path d="M 255 175 L 395 175" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="165" text-anchor="middle" class="s" font-weight="700">election timeout</text>
  <text x="325" y="148" text-anchor="middle" class="mono">no heartbeat</text>

  <!-- Candidate → Leader -->
  <path d="M 605 175 L 745 175" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="165" text-anchor="middle" class="s" font-weight="700">majority votes</text>
  <text x="675" y="148" text-anchor="middle" class="mono">wins election</text>

  <!-- Candidate → Follower (discovers higher term) -->
  <path d="M 440 245 C 380 320 220 320 170 245" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="305" y="315" text-anchor="middle" class="s">discovers leader</text>
  <text x="305" y="335" text-anchor="middle" class="s">or higher term</text>

  <!-- Leader → Follower (discovers higher term) -->
  <path d="M 790 245 C 700 380 250 380 130 245" fill="none" stroke="#ea4335" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="390" text-anchor="middle" class="s" fill="#c5221f">discovers higher term</text>
  <text x="470" y="408" text-anchor="middle" class="s" fill="#c5221f">(was partitioned; new leader elected)</text>

  <!-- Candidate self-loop (split vote → new election) -->
  <path d="M 530 140 C 560 80 580 80 560 135" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="580" y="85" text-anchor="start" class="s">split vote →</text>
  <text x="580" y="103" text-anchor="start" class="s">new election</text>

  <!-- Start arrow -->
  <path d="M 150 80 L 150 135" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="72" text-anchor="middle" class="s" font-style="italic">start</text>
</svg>
