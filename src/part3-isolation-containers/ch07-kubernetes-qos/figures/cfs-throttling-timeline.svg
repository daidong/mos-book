<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="400" viewBox="0 0 1100 400">
  <style>
    .t{font: 18px sans-serif; fill:#111}
    .h{font: 24px sans-serif; font-weight:700; fill:#111}
    .s{font: 15px sans-serif; fill:#111}
    .mono{font: 14px monospace; fill:#111}
  </style>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" class="h">CFS Bandwidth Throttling: cpu.max = "50000 100000"</text>
  <text x="550" y="55" text-anchor="middle" class="s">(Pod with limits.cpu: "500m" — half a core per 100 ms period)</text>

  <!-- Time axis -->
  <line x1="60" y1="320" x2="1060" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1070" y="325" class="s">time</text>

  <!-- Period markers -->
  <line x1="80" y1="85" x2="80" y2="330" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <line x1="380" y1="85" x2="380" y2="330" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <line x1="680" y1="85" x2="680" y2="330" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <line x1="980" y1="85" x2="980" y2="330" stroke="#999" stroke-width="1" stroke-dasharray="4"/>

  <text x="230" y="350" text-anchor="middle" class="s">Period 1 (100 ms)</text>
  <text x="530" y="350" text-anchor="middle" class="s">Period 2 (100 ms)</text>
  <text x="830" y="350" text-anchor="middle" class="s">Period 3 (100 ms)</text>

  <!-- Period 1 -->
  <!-- Running (green) — 50 ms quota -->
  <rect x="80" y="100" width="150" height="60" rx="4" fill="#34a853" opacity="0.8"/>
  <text x="155" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">RUNNING</text>
  <text x="155" y="155" text-anchor="middle" fill="white" class="mono">50 ms on-CPU</text>

  <!-- Throttled (red) — rest of period -->
  <rect x="230" y="100" width="150" height="60" rx="4" fill="#ea4335" opacity="0.8"/>
  <text x="305" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">THROTTLED</text>
  <text x="305" y="155" text-anchor="middle" fill="white" class="mono">50 ms off-CPU</text>

  <!-- Request arrives during throttle -->
  <line x1="290" y1="170" x2="290" y2="220" stroke="#fbbc04" stroke-width="3"/>
  <path d="M 282 220 L 290 235 L 298 220 Z" fill="#fbbc04"/>
  <text x="290" y="260" text-anchor="middle" class="s" fill="#e37400" font-weight="700">Request arrives</text>
  <text x="290" y="278" text-anchor="middle" class="s" fill="#e37400">→ waits until</text>
  <text x="290" y="296" text-anchor="middle" class="s" fill="#e37400">period 2 starts</text>

  <!-- Period 2 -->
  <rect x="380" y="100" width="150" height="60" rx="4" fill="#34a853" opacity="0.8"/>
  <text x="455" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">RUNNING</text>
  <text x="455" y="155" text-anchor="middle" fill="white" class="mono">50 ms on-CPU</text>

  <rect x="530" y="100" width="150" height="60" rx="4" fill="#ea4335" opacity="0.8"/>
  <text x="605" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">THROTTLED</text>
  <text x="605" y="155" text-anchor="middle" fill="white" class="mono">50 ms off-CPU</text>

  <!-- Period 3 -->
  <rect x="680" y="100" width="150" height="60" rx="4" fill="#34a853" opacity="0.8"/>
  <text x="755" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">RUNNING</text>
  <text x="755" y="155" text-anchor="middle" fill="white" class="mono">50 ms on-CPU</text>

  <rect x="830" y="100" width="150" height="60" rx="4" fill="#ea4335" opacity="0.8"/>
  <text x="905" y="135" text-anchor="middle" fill="white" class="s" font-weight="700">THROTTLED</text>
  <text x="905" y="155" text-anchor="middle" fill="white" class="mono">50 ms off-CPU</text>

  <!-- nr_throttled annotation -->
  <rect x="80" y="370" width="240" height="25" rx="4" fill="#fce8e6" stroke="#ea4335"/>
  <text x="200" y="388" text-anchor="middle" class="mono" fill="#c5221f">nr_throttled += 1 each period</text>

  <!-- Quota label -->
  <text x="80" y="88" class="s" font-weight="700">quota = 50 ms</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
