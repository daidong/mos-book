<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .node { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .body { font: 500 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .pill { font: 700 13px Arial, Helvetica, sans-serif; fill: white; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="540" fill="#f8fafc"/>
  <text x="40" y="42" class="title">Redis keeps the hot path in memory and adds durability as extra work</text>
  <text x="40" y="70" class="subtitle">That is why it can feel extremely fast. It is also why durability settings matter so much.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="180" rx="24" ry="24" width="170" height="110" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="110" y="225" class="node">Client</text>
    <text x="92" y="253" class="body">SET x 42</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="120" rx="28" ry="28" width="270" height="220" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
    <text x="410" y="162" class="node">Redis</text>
    <text x="384" y="190" class="body">event loop + in-memory data</text>
    <rect x="372" y="220" rx="16" ry="16" width="166" height="54" fill="#eff6ff"/>
    <text x="404" y="252" class="label">hot state in RAM</text>
    <rect x="390" y="292" rx="14" ry="14" width="130" height="30" fill="#3b82f6"/>
    <text x="416" y="312" class="pill">reply can be fast</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="80" rx="28" ry="28" width="380" height="150" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="835" y="120" class="node">AOF path</text>
    <text x="740" y="150" class="body">append command to log, then decide how hard to flush</text>
    <rect x="742" y="174" rx="12" ry="12" width="90" height="30" fill="#22c55e"/>
    <text x="764" y="194" class="pill">no</text>
    <rect x="852" y="174" rx="12" ry="12" width="110" height="30" fill="#16a34a"/>
    <text x="874" y="194" class="pill">everysec</text>
    <rect x="982" y="174" rx="12" ry="12" width="80" height="30" fill="#15803d"/>
    <text x="998" y="194" class="pill">always</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="270" rx="28" ry="28" width="380" height="170" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="835" y="310" class="node">RDB path</text>
    <text x="756" y="340" class="body">periodically fork a child, write a compact snapshot,</text>
    <text x="756" y="364" class="body">and keep the parent serving requests meanwhile</text>
    <rect x="760" y="388" rx="12" ry="12" width="132" height="30" fill="#f97316"/>
    <text x="780" y="408" class="pill">cheap restart</text>
    <rect x="910" y="388" rx="12" ry="12" width="134" height="30" fill="#ea580c"/>
    <text x="932" y="408" class="pill">loss window</text>
  </g>

  <line x1="230" y1="235" x2="318" y2="230" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="590" y1="190" x2="708" y2="155" stroke="#22c55e" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="590" y1="270" x2="708" y2="330" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="60" y="455" rx="18" ry="18" width="1080" height="42" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="95" y="482" class="label">Interpretation:</text>
  <text x="212" y="482" class="body">Redis starts with RAM because that makes the common path cheap. Durability comes back in through AOF flushes and snapshot side effects.</text>
</svg>
