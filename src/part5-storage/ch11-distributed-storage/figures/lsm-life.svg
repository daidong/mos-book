<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .node { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .body { font: 500 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .pill { font: 700 13px Arial, Helvetica, sans-serif; fill: white; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="540" fill="#f8fafc"/>
  <text x="40" y="42" class="title">LSM engines keep writes cheap now and pay by rewriting data later</text>
  <text x="40" y="70" class="subtitle">The core idea is simple: append quickly, flush sequentially, merge immutable files in the background.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="170" rx="24" ry="24" width="160" height="100" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="84" y="225" class="node">Write</text>
    <text x="80" y="248" class="body">PUT k=v</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="270" y="150" rx="24" ry="24" width="180" height="140" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="335" y="194" class="node">WAL</text>
    <text x="296" y="222" class="body">durable append</text>
    <rect x="305" y="246" rx="12" ry="12" width="110" height="28" fill="#16a34a"/>
    <text x="327" y="265" class="pill">crash recovery</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="140" rx="24" ry="24" width="190" height="160" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="576" y="186" class="node">Memtable</text>
    <text x="568" y="214" class="body">sorted state in RAM</text>
    <text x="556" y="238" class="body">absorbs many writes cheaply</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="110" rx="24" ry="24" width="320" height="220" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
    <text x="896" y="154" class="node">SSTables</text>
    <text x="858" y="182" class="body">immutable sorted files on disk</text>
    <rect x="845" y="220" width="56" height="72" rx="12" fill="#c4b5fd"/>
    <rect x="915" y="198" width="56" height="94" rx="12" fill="#a78bfa"/>
    <rect x="985" y="236" width="56" height="56" rx="12" fill="#8b5cf6"/>
    <text x="848" y="312" class="body">flush full memtable</text>
  </g>

  <line x1="200" y1="220" x2="268" y2="220" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="450" y1="220" x2="528" y2="220" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="720" y1="220" x2="798" y2="220" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="226" y="200" class="body">append</text>
  <text x="477" y="200" class="body">insert</text>
  <text x="742" y="200" class="body">flush</text>

  <path d="M920 350 C 980 390, 1040 390, 1100 350" fill="none" stroke="#f59e0b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="820" y="370" rx="18" ry="18" width="300" height="82" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
  <text x="910" y="404" class="node">Compaction</text>
  <text x="852" y="430" class="body">merge files, drop stale versions, trade</text>
  <text x="877" y="452" class="body">future reads for background rewrite work</text>
</svg>
