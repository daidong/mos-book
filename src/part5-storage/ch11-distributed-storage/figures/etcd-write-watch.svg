<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .node { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .body { font: 500 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .pill { font: 700 13px Arial, Helvetica, sans-serif; fill: white; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="40" y="42" class="title">etcd is not just a database; it is a revisioned coordination point</text>
  <text x="40" y="70" class="subtitle">The same consistent history that makes writes safe also makes watches useful to the control plane.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="150" rx="24" ry="24" width="200" height="110" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="112" y="195" class="node">API server</text>
    <text x="92" y="223" class="body">writes desired state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="100" rx="32" ry="32" width="430" height="220" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
    <text x="545" y="142" class="node">etcd cluster</text>
    <text x="478" y="170" class="body">Raft log + MVCC key space</text>
    <rect x="430" y="200" rx="16" ry="16" width="330" height="82" fill="#ecfdf5"/>
    <text x="458" y="232" class="label">commit revision N</text>
    <text x="458" y="257" class="body">majority persists the entry, then current state advances</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="110" rx="24" ry="24" width="180" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="990" y="165" class="node">Scheduler</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="235" rx="24" ry="24" width="180" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="975" y="290" class="node">Controller</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="360" rx="24" ry="24" width="180" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="1000" y="415" class="node">kubelet</text>
  </g>

  <line x1="260" y1="205" x2="378" y2="205" stroke="#3b82f6" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="272" y="188" class="body">PUT pod spec</text>

  <line x1="812" y1="160" x2="948" y2="155" stroke="#16a34a" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <text x="835" y="140" class="body">watch revision N</text>

  <line x1="812" y1="248" x2="948" y2="280" stroke="#16a34a" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <text x="825" y="230" class="body">watch revision N</text>

  <line x1="812" y1="285" x2="948" y2="405" stroke="#16a34a" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <text x="824" y="334" class="body">watch revision N</text>

  <line x1="950" y1="205" x2="810" y2="205" stroke="#64748b" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="840" y="190" class="body">write scheduling result</text>

  <rect x="60" y="470" rx="20" ry="20" width="1070" height="46" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="88" y="499" class="label">Reading guide:</text>
  <text x="205" y="499" class="body">etcd pays for a consistent history on the write path, then reuses that revision stream to drive watch-based control loops.</text>
</svg>
