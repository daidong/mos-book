# Lab 5 Part C: Memory OOM Experiment
#
# This Pod has a 128 MiB memory limit and auto-starts a program
# that tries to allocate 256 MiB.  The kernel will OOM-kill the
# process once usage hits memory.max.

apiVersion: v1
kind: Pod
metadata:
  name: mem-stress
  labels:
    app: mem-stress
    experiment: oom
spec:
  containers:
  - name: stress
    image: ubuntu:22.04
    command:
    - /bin/bash
    - -c
    - |
      echo "Allocating 256 MiB in a 128 MiB cgroup..."
      # Allocate in 4 MiB steps so the OOM is visible
      python3 -c "
      import time
      blocks = []
      for i in range(64):
          blocks.append(bytearray(4 * 1024 * 1024))
          print(f'Allocated {(i+1)*4} MiB', flush=True)
          time.sleep(0.2)
      print('Done — should have been killed by now')
      " 2>&1 || echo "Process killed (expected)"
      sleep infinity
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"   # OOM will fire well before 256 MiB
        cpu: "100m"
  restartPolicy: Always    # Kubelet restarts → CrashLoopBackOff

---
# Higher-limit variant for comparison (Part C follow-up)
apiVersion: v1
kind: Pod
metadata:
  name: mem-stress-relaxed
  labels:
    app: mem-stress
    experiment: oom
spec:
  containers:
  - name: stress
    image: ubuntu:22.04
    command:
    - /bin/bash
    - -c
    - |
      echo "Allocating 256 MiB in a 512 MiB cgroup (should succeed)..."
      python3 -c "
      import time
      blocks = []
      for i in range(64):
          blocks.append(bytearray(4 * 1024 * 1024))
          print(f'Allocated {(i+1)*4} MiB', flush=True)
          time.sleep(0.2)
      print('Done — no OOM expected')
      time.sleep(3600)
      "
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"    # Plenty of headroom
        cpu: "100m"
  restartPolicy: Always
