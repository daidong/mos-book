# Lab 9 Part C.5: Node Affinity Demo
#
# This Pod prefers worker nodes labeled disktype=ssd.
# Label one worker before applying:
#   kubectl label node <worker-name> disktype=ssd
#
# Then apply and check which node the Pod lands on:
#   kubectl apply -f manifests/node-affinity-demo.yaml
#   kubectl get pod affinity-demo -o wide

apiVersion: v1
kind: Pod
metadata:
  name: affinity-demo
  labels:
    app: affinity-demo
spec:
  containers:
  - name: main
    image: busybox:1.36
    command: ["sleep", "600"]
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
  affinity:
    nodeAffinity:
      # Hard constraint: must be a worker (not control-plane)
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist
      # Soft constraint: prefer SSD nodes
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: disktype
            operator: In
            values: ["ssd"]
  restartPolicy: Never
